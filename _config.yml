theme: jekyll-theme-guofeng
title: 国风主题
description: A Jekyll theme with Chinese traditional style (Guofeng) for anime and data visualization
lang: zh-CN
url: "https://yansheng836.github.io"
baseurl: "/jekyll-theme-guofeng"

# 主题特定配置
theme:
  show_toc: true
  wide_layout: true

# SEO
twitter:
  username: yansheng836
logo: /assets/images/logo.png

# 构建排除
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - docs
  - "*.gemspec"
